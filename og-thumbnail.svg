    <text x="20" y="32" font-size="12" font-family="-apple-system, sans-serif" font-weight="600" fill="#3a5478">RECEITA TOTAL</text>
    <text x="20" y="62" font-size="22" font-family="-apple-system, sans-serif" font-weight="500" fill="#00e5a0">R$ 32.364</text>
