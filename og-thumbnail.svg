      <stop offset="0" stop-color="#0f1a2e"/>
      <stop offset="0.5" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#04080f"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
