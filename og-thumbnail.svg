    <radialGradient id="glow" cx="0.2" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1d8cf8" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#1d8cf8" stop-opacity="0"/>
